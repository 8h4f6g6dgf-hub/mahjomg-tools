<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>麻雀収支ツール v1.2.0</title>
  <style>
    *{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;margin:0;background:#f5f6f8;color:#222;-webkit-text-size-adjust:100%}.container{max-width:720px;margin:0 auto;padding:18px 12px 44px}h1{font-size:22px;margin:12px 0 4px}h2{font-size:18px;margin:0 0 12px}.release{display:inline-block;font-size:12px;font-weight:800;color:#555;background:#eceff3;padding:4px 8px;border-radius:999px;margin-left:6px}.sub{color:#666;font-size:14px;line-height:1.6;margin-bottom:16px}.status{background:#eef7f0;color:#0a7a32;border:1px solid #cfe8d5;border-radius:12px;padding:9px 10px;font-size:13px;font-weight:800;margin-bottom:12px}.card{background:#fff;border:1px solid #e3e5e8;border-radius:18px;padding:15px;margin-top:14px;box-shadow:0 2px 10px rgba(0,0,0,.03)}.score-list{display:flex;flex-direction:column;gap:11px}.score-row{display:grid;grid-template-columns:64px minmax(0,1fr);gap:9px;align-items:center;width:100%}.score-name{font-weight:900;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}input,select,textarea{width:100%;border:1px solid #d5d8de;border-radius:14px;padding:13px 12px;font-size:16px;background:#fff;color:#222;outline:none;min-height:48px}textarea{min-height:145px;resize:vertical;line-height:1.6;margin-top:10px}button{border:none;border-radius:15px;padding:14px 12px;min-height:50px;font-size:16px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.buttons{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}.primary{background:#222;color:#fff}.secondary{background:#e8ebf0;color:#222}.danger{background:#ffe8e8;color:#b22222}.result-row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #eef0f3;font-size:17px}.result-row:last-child{border-bottom:none}.plus{color:#0a7a32;font-weight:800}.minus{color:#c33131;font-weight:800}.zero{color:#555;font-weight:800}pre{white-space:pre-wrap;word-break:break-word;background:#f7f8fa;border-radius:14px;padding:13px;margin:0;font-size:15px;line-height:1.6;min-height:58px}.small{font-size:13px;color:#777;margin-top:10px;line-height:1.5}.check-ok{color:#0a7a32;font-weight:800}.check-ng{color:#b45f00;font-weight:800}.error{color:#b22222;font-weight:800;margin-top:10px;font-size:13px}details summary{cursor:pointer;font-weight:900;font-size:17px}.two-col{display:grid;grid-template-columns:1fr;gap:10px}.history-item{background:#f7f8fa;border:1px solid #edf0f3;border-radius:14px;padding:12px;margin-top:10px}.history-head{display:flex;justify-content:space-between;gap:10px;align-items:center;font-weight:900;margin-bottom:8px}.history-date{font-size:15px}.history-badge{background:#222;color:#fff;padding:4px 8px;border-radius:999px;font-size:12px;white-space:nowrap}.history-body{font-size:14px;line-height:1.55;white-space:pre-wrap;color:#333;background:#fff;border-radius:10px;padding:9px}.history-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}.history-actions button{min-height:40px;font-size:13px;padding:8px 10px;border-radius:11px}.member-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#f7f8fa;border-radius:14px;padding:9px;margin-top:8px}.member-label{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.member-row button{min-height:38px;padding:8px 11px;font-size:13px;border-radius:11px}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#222;color:#fff;padding:10px 14px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:20;white-space:nowrap}.toast.show{opacity:1}@media(min-width:520px){.buttons,.two-col{grid-template-columns:1fr 1fr}.score-row{grid-template-columns:72px minmax(0,1fr)}}
  </style>
</head>
<body>
  <div class="container">
    <h1>麻雀収支ツール <span class="release">v1.2.0</span></h1>
    <div class="sub">履歴保存対応版。日付と試合枠を選んで保存できる。</div>
    <div id="status" class="status">JS起動OK：v1.2.0</div>
    <section class="card"><h2>入力</h2><div id="scoreList" class="score-list"><div class="score-row" data-name="たい"><div class="score-name">たい</div><input class="score-input" inputmode="text" autocomplete="off" placeholder="+1000 -2000 など" oninput="calculateOnly()"></div><div class="score-row" data-name="まさ"><div class="score-name">まさ</div><input class="score-input" inputmode="text" autocomplete="off" placeholder="+1000 -2000 など" oninput="calculateOnly()"></div><div class="score-row" data-name="ゆひ"><div class="score-name">ゆひ</div><input class="score-input" inputmode="text" autocomplete="off" placeholder="+1000 -2000 など" oninput="calculateOnly()"></div><div class="score-row" data-name="くり"><div class="score-name">くり</div><input class="score-input" inputmode="text" autocomplete="off" placeholder="+1000 -2000 など" oninput="calculateOnly()"></div></div><div class="buttons"><button class="primary" type="button" onclick="calculateAndCopy()">計算してコピー</button><button class="secondary" type="button" onclick="clearScores()">点数クリア</button></div></section>
    <section class="card"><h2>保存情報</h2><div class="two-col"><div><div class="small">日付</div><input id="matchDate" type="date"></div><div><div class="small">試合枠</div><select id="matchSlot"><option value="">選択してください</option><option value="1-1">1-1</option><option value="1-2">1-2</option><option value="2-1">2-1</option><option value="2-2">2-2</option></select></div></div><div id="saveError" class="error"></div><div class="buttons"><button class="primary" type="button" onclick="saveHistory()">履歴へ保存</button></div><div class="small">日付・試合枠は必須。同じ日付＋試合枠がある場合は上書き確認が出る。</div></section>
    <section class="card"><h2>コピー表示順</h2><select id="sortMode" onchange="calculateOnly()"><option value="score">プラス順</option><option value="member">名前順</option></select><div class="small">選んだ順番で「コピペ用」の並びが変わる。</div></section>
    <section class="card"><h2>結果</h2><div id="result">まだ計算してないよ</div><div id="check" class="small"></div></section>
    <section class="card"><h2>コピペ用</h2><pre id="copyText"></pre><div class="buttons"><button class="primary" type="button" onclick="copyResult()">コピー</button><button class="secondary" type="button" onclick="calculateOnly()">再計算</button></div></section>
    <section class="card"><details open><summary>履歴一覧</summary><div id="historyList"></div><div class="buttons"><button class="danger" type="button" onclick="clearAllHistory()">履歴を全削除</button></div></details></section>
    <section class="card"><details><summary>貼り付け入力</summary><div class="small">前みたいにまとめて貼る場合はこちら。未登録の名前は自動でメンバー追加される。</div><textarea id="freeInput" placeholder="たい：510 -6230&#10;まさ：+5510 -340&#10;ゆひ：+20550 6100&#10;くり：-26570 470"></textarea><div class="buttons"><button class="secondary" type="button" onclick="applyFreeInput()">固定欄に反映</button><button class="secondary" type="button" onclick="clearFreeInput()">貼付欄クリア</button></div></details></section>
    <section class="card"><details><summary>メンバー設定</summary><div class="small">追加・削除は画面上に反映される。</div><div id="memberList"></div><div style="margin-top:12px;"><input id="newMemberName" placeholder="追加する名前 例：たろう"><div class="buttons"><button class="primary" type="button" onclick="addMember()">追加</button><button class="danger" type="button" onclick="resetMembers()">初期メンバーに戻す</button></div></div></details></section>
  </div><div id="toast" class="toast">コピーしたよ</div>
  <script>
    var HISTORY_KEY='mahjong_tool_history_v120';
    function normalizeText(text){return String(text).replace(/[＋]/g,'+').replace(/[−ー―－]/g,'-').replace(/[：]/g,':').replace(/,/g,'')}
    function trimText(text){return String(text).replace(/^\s+|\s+$/g,'')}
    function parseNumbers(text){var m=normalizeText(text).match(/[+-]?\d+/g),r=[],i;if(!m)return r;for(i=0;i<m.length;i++)r.push(Number(m[i]));return r}
    function getRows(){return document.getElementById('scoreList').getElementsByClassName('score-row')}
    function calculateOnly(){var rows=getRows(),entries=[],i,j;for(i=0;i<rows.length;i++){var name=rows[i].getAttribute('data-name'),input=rows[i].getElementsByTagName('input')[0],nums=parseNumbers(input.value),total=0;for(j=0;j<nums.length;j++)total+=nums[j];entries.push({name:name,total:total,order:i,raw:input.value})}renderResult(entries);renderCopy(entries);return entries}
    function renderResult(entries){var sorted=entries.slice(0),html='',grand=0,i;sorted.sort(function(a,b){return b.total-a.total});for(i=0;i<sorted.length;i++){var item=sorted[i],cls=item.total>0?'plus':item.total<0?'minus':'zero',sign=item.total>0?'+':'';grand+=item.total;html+='<div class="result-row"><span>'+escapeHtml(item.name)+'</span><span class="'+cls+'">'+sign+item.total+'</span></div>'}var gcls=grand>0?'plus':grand<0?'minus':'zero',gsign=grand>0?'+':'';html+='<div class="result-row"><span>合計</span><span class="'+gcls+'">'+gsign+grand+'</span></div>';document.getElementById('result').innerHTML=html;document.getElementById('check').innerHTML=grand===0?'<span class="check-ok">検算OK：合計は0</span>':'<span class="check-ng">検算注意：合計が'+gsign+grand+'になってる</span>'}
    function renderCopy(entries){var sorted=entries.slice(0),mode=document.getElementById('sortMode').value,lines=[],i;if(mode==='score')sorted.sort(function(a,b){return b.total-a.total});else sorted.sort(function(a,b){return a.order-b.order});for(i=0;i<sorted.length;i++)lines.push(sorted[i].name+' '+(sorted[i].total>0?'+':'')+sorted[i].total);document.getElementById('copyText').textContent=lines.join('\n')}
    function calculateAndCopy(){calculateOnly();copyResult()}
    function copyResult(){var text=document.getElementById('copyText').textContent;if(!trimText(text))return;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){showToast('コピーしたよ')}).catch(function(){fallbackCopy(text)})}else fallbackCopy(text)}
    function fallbackCopy(text){var temp=document.createElement('textarea');temp.value=text;temp.style.position='fixed';temp.style.left='-9999px';document.body.appendChild(temp);temp.focus();temp.select();document.execCommand('copy');document.body.removeChild(temp);showToast('コピーしたよ')}
    function saveHistory(){var date=document.getElementById('matchDate').value,slot=document.getElementById('matchSlot').value,error=document.getElementById('saveError');error.textContent='';if(!date){error.textContent='日付を選択してください';return}if(!slot){error.textContent='試合枠を選択してください';return}var entries=calculateOnly(),histories=loadHistory(),key=date+'_'+slot,idx=-1,i;for(i=0;i<histories.length;i++)if(histories[i].key===key)idx=i;if(idx>=0&&!confirm(date+' '+slot+' は既に保存されています。上書きしますか？'))return;var item={key:key,date:date,slot:slot,sortMode:document.getElementById('sortMode').value,savedAt:new Date().toISOString(),entries:entries,copyText:document.getElementById('copyText').textContent};if(idx>=0)histories[idx]=item;else histories.push(item);saveHistoryList(histories);renderHistory();showToast('履歴に保存したよ')}
    function loadHistory(){try{var d=JSON.parse(localStorage.getItem(HISTORY_KEY));if(d&&d.length)return d}catch(e){}return[]}
    function saveHistoryList(histories){try{localStorage.setItem(HISTORY_KEY,JSON.stringify(histories))}catch(e){alert('履歴保存に失敗しました。端末の保存容量やプライベートブラウズを確認してください。')}}
    function renderHistory(){var histories=loadHistory(),box=document.getElementById('historyList'),html='',i;histories.sort(function(a,b){if(a.date===b.date)return b.slot>a.slot?1:-1;return b.date>a.date?1:-1});if(histories.length===0){box.innerHTML='<div class="small">まだ履歴はありません。</div>';return}for(i=0;i<histories.length;i++){html+='<div class="history-item"><div class="history-head"><div class="history-date">'+escapeHtml(histories[i].date)+'</div><div class="history-badge">'+escapeHtml(histories[i].slot)+'</div></div><div class="history-body">'+escapeHtml(histories[i].copyText)+'</div><div class="history-actions"><button class="secondary" type="button" onclick="restoreHistory(\''+escapeJs(histories[i].key)+'\')">復元</button><button class="danger" type="button" onclick="deleteHistory(\''+escapeJs(histories[i].key)+'\')">削除</button></div></div>'}box.innerHTML=html}
    function restoreHistory(key){var histories=loadHistory(),item=null,i;for(i=0;i<histories.length;i++)if(histories[i].key===key)item=histories[i];if(!item)return;document.getElementById('matchDate').value=item.date;document.getElementById('matchSlot').value=item.slot;document.getElementById('sortMode').value=item.sortMode||'score';var list=document.getElementById('scoreList');list.innerHTML='';for(i=0;i<item.entries.length;i++){var row=createMemberRow(item.entries[i].name);row.getElementsByTagName('input')[0].value=item.entries[i].raw||''}renderMemberList();calculateOnly();showToast('履歴を復元したよ')}
    function deleteHistory(key){if(!confirm('この履歴を削除しますか？'))return;var h=loadHistory(),n=[],i;for(i=0;i<h.length;i++)if(h[i].key!==key)n.push(h[i]);saveHistoryList(n);renderHistory();showToast('履歴を削除したよ')}
    function clearAllHistory(){if(!confirm('履歴をすべて削除しますか？'))return;saveHistoryList([]);renderHistory();showToast('履歴を全削除したよ')}
    function clearScores(){var rows=getRows(),i;for(i=0;i<rows.length;i++)rows[i].getElementsByTagName('input')[0].value='';document.getElementById('result').textContent='まだ計算してないよ';document.getElementById('copyText').textContent='';document.getElementById('check').textContent=''}
    function clearFreeInput(){document.getElementById('freeInput').value=''}
    function applyFreeInput(){var text=normalizeText(document.getElementById('freeInput').value),lines=text.split(/\n+/),i;for(i=0;i<lines.length;i++){var line=trimText(lines[i]);if(!line)continue;var match=line.match(/^([^\s:]+)\s*:?\s*(.*)$/);if(!match)continue;var name=trimText(match[1]),values=trimText(match[2]),row=findRowByName(name);if(!row)row=createMemberRow(name);row.getElementsByTagName('input')[0].value=values}renderMemberList();calculateOnly();showToast('固定欄に反映したよ')}
    function findRowByName(name){var rows=getRows(),i;for(i=0;i<rows.length;i++)if(rows[i].getAttribute('data-name')===name)return rows[i];return null}
    function createMemberRow(name){var list=document.getElementById('scoreList'),row=document.createElement('div'),label=document.createElement('div'),input=document.createElement('input');row.className='score-row';row.setAttribute('data-name',name);label.className='score-name';label.appendChild(document.createTextNode(name));input.className='score-input';input.setAttribute('inputmode','text');input.setAttribute('autocomplete','off');input.setAttribute('placeholder','+1000 -2000 など');input.oninput=function(){calculateOnly()};row.appendChild(label);row.appendChild(input);list.appendChild(row);return row}
    function addMember(){var input=document.getElementById('newMemberName'),name=trimText(input.value);if(!name)return;if(findRowByName(name)){showToast('すでにいる名前だよ');return}createMemberRow(name);input.value='';renderMemberList();calculateOnly();showToast('メンバー追加したよ')}
    function removeMemberByName(name){var row=findRowByName(name),list=document.getElementById('scoreList');if(!row)return;if(getRows().length<=1){showToast('1人は残してね');return}list.removeChild(row);renderMemberList();calculateOnly();showToast('メンバー削除したよ')}
    function resetMembers(){var list=document.getElementById('scoreList');list.innerHTML='';createMemberRow('たい');createMemberRow('まさ');createMemberRow('ゆひ');createMemberRow('くり');renderMemberList();clearScores();calculateOnly();showToast('初期メンバーに戻したよ')}
    function renderMemberList(){var rows=getRows(),box=document.getElementById('memberList'),html='',i;for(i=0;i<rows.length;i++){var name=rows[i].getAttribute('data-name');html+='<div class="member-row"><div class="member-label">'+escapeHtml(name)+'</div><button class="danger" type="button" onclick="removeMemberByName(\''+escapeJs(name)+'\')">削除</button></div>'}box.innerHTML=html}
    function showToast(message){var toast=document.getElementById('toast');toast.textContent=message;toast.className='toast show';setTimeout(function(){toast.className='toast'},1400)}
    function escapeHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
    function escapeJs(str){return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
    renderMemberList();renderHistory();calculateOnly();
  </script>
</body>
</html>
